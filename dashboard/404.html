<!DOCTYPE html>
<html>
<head>
<meta http-equiv="refresh" content="0;url=index.html">
<script>
// Preserve the route so the SPA can pick it up
const path = window.location.pathname.replace(/.*\/vllm-tracker\/?/, '');
if (path) {
  window.location.replace(window.location.origin + '/vllm-tracker/index.html#/' + path);
} else {
  window.location.replace(window.location.origin + '/vllm-tracker/index.html');
}
</script>
</head>
</html>
